<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Art: Zenitsu Agatsuma</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="canvas">
        <div class="zenitsu">
            <div class="haori">
                <div class="triangle t1"></div>
                <div class="triangle t2"></div>
                <div class="triangle t3"></div>
                <div class="collar"></div>
            </div>

            <div class="head">
                <div class="ears"></div>
                <div class="face">
                    <div class="eye left">
                        <div class="pupil"></div>
                    </div>
                    <div class="eye right">
                        <div class="pupil"></div>
                    </div>
                    <div class="eyebrow left-brow"></div>
                    <div class="eyebrow right-brow"></div>
                    <div class="blush left-blush"></div>
                    <div class="blush right-blush"></div>
                    <div class="mouth"></div>
                </div>
            </div>

            <div class="hair-back"></div>
            <div class="hair-top">
                <div class="bang b1"></div>
                <div class="bang b2"></div>
                <div class="bang b3"></div>
                <div class="bang b4"></div>
            </div>
        </div>
    </div>
</body>
</html>
